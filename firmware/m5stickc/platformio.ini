; PlatformIO project for the M5StickC Plus2 OpenTama firmware.
;
; This is a *transmit-only* PoC: the stick periodically blinks an
; OpenTama HELLO frame out of its built-in IR LED, and two buttons let
; you fire GIFT and VISIT frames. Receiving back from a peer needs
; either (a) a second stick with an IR Unit / Hat, or (b) a PC with a
; USB-IR adapter running `python -m opentama proximity scan`.
;
; Build:    pio run -e m5stick-c-plus2
; Upload:   pio run -e m5stick-c-plus2 -t upload
; Monitor:  pio device monitor -b 115200

[env:m5stick-c-plus2]
platform = espressif32
board = m5stick-c-plus2
framework = arduino
monitor_speed = 115200
upload_speed = 1500000
build_flags =
    -DOPENTAMA_PET_NAME='"たころん"'
    -DOPENTAMA_PET_STAGE='"child"'
    -DOPENTAMA_PET_GP=60
    ; IR receive pin. Set to -1 to compile a transmit-only firmware.
    ; Default 33 = M5StickC Plus2 Grove port data line.
    -DOPENTAMA_IR_RX_PIN=33
lib_deps =
    m5stack/M5Unified @ ^0.1.16
